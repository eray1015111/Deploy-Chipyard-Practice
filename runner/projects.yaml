global_settings:
  chipyard_dir: "../chipyard"

projects:
  - name: "[Baseline] Pure Software Execution"
    description: "Pure C golden model for correctness and cycle baseline"
    knowledge_base: "Runs the 32-bit Galois LFSR entirely on the Rocket core."
    makefile_dir: "../demos/demo"
    compile_cmd: "riscv64-unknown-elf-gcc -O2 -march=rv64gc -mabi=lp64d -mcmodel=medany -fno-common -fno-builtin-printf -specs=htif_nano.specs -T htif.ld -I. -static -o pure_c_test.riscv pure_c_test.c"
    binary_name: "pure_c_test.riscv"
    hw_config: "RocketConfig"

  - name: "[Architecture A] MMIO LFSR Accelerator"
    description: "TileLink register-mapped peripheral at 0x6000"
    knowledge_base: "CPU writes seed and step count through MMIO and polls status/result registers."
    makefile_dir: "../demos/demo"
    compile_cmd: "riscv64-unknown-elf-gcc -O2 -march=rv64gc -mabi=lp64d -mcmodel=medany -fno-common -fno-builtin-printf -specs=htif_nano.specs -T htif.ld -I. -static -o lfsr_test.riscv lfsr_test.c"
    binary_name: "lfsr_test.riscv"
    hw_config: "LFSRDemoRocketConfig"

  - name: "[Architecture B] RoCC Custom Coprocessor"
    description: "Tightly coupled custom instruction accelerator"
    knowledge_base: "RoCC passes seed and step count through custom0 and returns the final LFSR state in rd."
    makefile_dir: "../demos/demo_rocc"
    compile_cmd: "riscv64-unknown-elf-gcc -O2 -march=rv64gc -mabi=lp64d -mcmodel=medany -fno-common -fno-builtin-printf -specs=htif_nano.specs -T htif.ld -I. -static -o lfsr_rocc_test.riscv lfsr_rocc_test.c"
    binary_name: "lfsr_rocc_test.riscv"
    hw_config: "RoCCDemoRocketConfig"

  - name: "[Architecture C] RVV Vector Implementation"
    description: "Vectorized LFSR using RISC-V Vector intrinsics"
    knowledge_base: "Runs many independent LFSR streams using the vector unit. This is not a custom LFSR RTL block."
    makefile_dir: "../demos/demo_rvv"
    compile_cmd: "riscv64-unknown-elf-gcc -O2 -march=rv64gcv -mabi=lp64d -mcmodel=medany -fno-common -fno-builtin-printf -specs=htif_nano.specs -T htif.ld -I. -static -o rvv_test.riscv rvv_test.c"
    binary_name: "rvv_test.riscv"
    hw_config: "RVVDemoRocketConfig"

  - name: "[Architecture D] TileLink DMA LFSR"
    description: "Loosely coupled TileLink master peripheral at 0x7000"
    knowledge_base: "DMA reads a seed from memory, computes the LFSR sequence, and writes the result back."
    makefile_dir: "../demos/demo_dma"
    compile_cmd: "riscv64-unknown-elf-gcc -O2 -march=rv64gc -mabi=lp64d -mcmodel=medany -fno-common -fno-builtin-printf -specs=htif_nano.specs -T htif.ld -I. -static -o dma_test.riscv dma_test.c"
    binary_name: "dma_test.riscv"
    hw_config: "DMADemoRocketConfig"

  - name: "[Debug] Pure Software Waveform Run"
    description: "Runs baseline binary with waveform output enabled by the simulator command"
    knowledge_base: "Use this only when waveform inspection is needed; it is slower than normal simulation."
    makefile_dir: "../demos/demo"
    compile_cmd: "riscv64-unknown-elf-gcc -O2 -march=rv64gc -mabi=lp64d -mcmodel=medany -fno-common -fno-builtin-printf -specs=htif_nano.specs -T htif.ld -I. -static -o pure_c_test.riscv pure_c_test.c"
    binary_name: "pure_c_test.riscv"
    hw_config: "RocketConfig"
    is_debug: true
